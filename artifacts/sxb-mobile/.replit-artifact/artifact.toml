kind = "mobile"
previewPath = "/mobile/"
title = "SXB VPN Mobile"
version = "1.0.0"
id = "artifacts/sxb-mobile"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/mobile/" ]
localPort = 21386

[services.development]
run = "pnpm --filter @workspace/sxb-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sxb-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/sxb-mobile", "run", "serve" ]

[services.env]
PORT = "21386"
BASE_PATH = "/mobile/"
