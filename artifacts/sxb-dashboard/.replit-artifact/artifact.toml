kind = "web"
previewPath = "/"
title = "SXB VPN Dashboard"
version = "1.0.0"
id = "artifacts/sxb-dashboard"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20925

[services.development]
run = "pnpm --filter @workspace/sxb-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sxb-dashboard", "run", "build" ]
serve = "static"
publicDir = "artifacts/sxb-dashboard/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20925"
BASE_PATH = "/"
