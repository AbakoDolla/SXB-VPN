name: Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - 'artifacts/sxb-mobile/**'
  pull_request:
    branches:
      - main
    paths:
      - 'artifacts/sxb-mobile/**'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --shamefully-hoist

      - name: Typecheck mobile app
        run: pnpm --filter @workspace/sxb-mobile run typecheck

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies (hoisted for Metro bundler)
        run: pnpm install --no-frozen-lockfile --shamefully-hoist

      - name: Generate native Android project (expo prebuild)
        working-directory: artifacts/sxb-mobile
        run: npx expo prebuild --platform android --no-install --clean
        env:
          EXPO_PUBLIC_API_URL: https://vpnsxb.afrihall.com/api

      - name: Make Gradle wrapper executable
        working-directory: artifacts/sxb-mobile/android
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('artifacts/sxb-mobile/android/**/*.gradle*', 'artifacts/sxb-mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Build Release APK
        working-directory: artifacts/sxb-mobile/android
        run: ./gradlew assembleRelease --no-daemon
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          EXPO_PUBLIC_API_URL: https://vpnsxb.afrihall.com/api
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx4g -XX:+HeapDumpOnOutOfMemoryError"

      - name: Locate and copy APK
        id: find-apk
        working-directory: artifacts/sxb-mobile/android
        run: |
          APK_PATH=$(find . -name '*.apk' | grep -v test | head -1)
          echo "Found APK: $APK_PATH"
          ls -lh "$APK_PATH"
          mkdir -p apk-output
          cp "$APK_PATH" apk-output/sxb-vpn-android.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: sxb-vpn-android-${{ github.sha }}
          path: artifacts/sxb-mobile/android/apk-output/sxb-vpn-android.apk
          retention-days: 30

  notify-vps:
    name: Notify VPS of new build
    runs-on: ubuntu-latest
    needs: [build-android]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger VPS deployment hook
        run: |
          curl -s -X POST https://vpnsxb.afrihall.com/api/webhooks/deploy \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_SECRET }}" \
            -d '{"source":"github","branch":"main","sha":"${{ github.sha }}"}' \
            || echo "VPS webhook not configured yet - skipping"
