name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'app-mobile/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Pas de cache npm : app-mobile n'a pas de package-lock.json committé
          # (cache-dependency-path sur un fichier inexistant fait échouer cette étape)

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate native Android project (Expo prebuild)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_PUBLIC_API_URL: https://vpnsxb.afrihall.com/api

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK (release, debug-signed for direct install)
        working-directory: app-mobile/android
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Locate built APK
        working-directory: app-mobile
        run: |
          mkdir -p build
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::No APK found in build outputs"
            find android/app/build/outputs -type f
            exit 1
          fi
          cp "$APK_PATH" build/sxb-vpn.apk
          echo "APK copied: $APK_PATH -> build/sxb-vpn.apk"
          ls -la build/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sxb-vpn-android-apk
          path: app-mobile/build/sxb-vpn.apk
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release (on main push)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: SXB VPN APK build #${{ github.run_number }}
          body: |
            ## SXB VPN Android APK
            Build automatique depuis le commit `${{ github.sha }}`

            ### Installation
            1. Télécharger le fichier `.apk`
            2. Activer "Sources inconnues" sur Android
            3. Installer l'APK
            4. Activer avec ton code `SXB-USER-XXXX`
          files: app-mobile/build/sxb-vpn.apk
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
