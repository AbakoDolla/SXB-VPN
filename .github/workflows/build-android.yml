name: Build Android APK — SXB VPN

on:
  push:
    branches: [main]
    paths:
      - "app-mobile/**"
      - ".github/workflows/build-android.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-mobile

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js setup ─────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Note: pas de cache npm ici car package-lock.json n'est pas committé.
          # Le cache node_modules est géré séparément à l'étape suivante.

      # ── JDK ───────────────────────────────────────────────────────────────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── Gradle cache ─────────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-expo54-${{ hashFiles('app-mobile/android/gradle/wrapper/gradle-wrapper.properties', 'app-mobile/package.json') }}
          restore-keys: |
            gradle-expo54-
            gradle-

      # ── npm cache ─────────────────────────────────────────────────────────────
      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v4
        with:
          path: app-mobile/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('app-mobile/package-lock.json') }}
          restore-keys: node-modules-${{ runner.os }}-

      # ── Install deps ──────────────────────────────────────────────────────────
      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm install --legacy-peer-deps

      # ── sing-box binaire (pour protocoles VLESS/VMess/Trojan/SS/WG/Hysteria2) ─
      - name: Download sing-box binaries
        run: |
          mkdir -p assets
          SINGBOX_VERSION="1.11.7"
          
          # arm64-v8a
          echo "Téléchargement sing-box arm64 v${SINGBOX_VERSION}..."
          curl -fsSL "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VERSION}/sing-box-${SINGBOX_VERSION}-android-arm64-v8a.tar.gz" \
            | tar -xz --strip-components=1 -O "sing-box-${SINGBOX_VERSION}-android-arm64-v8a/sing-box" > assets/sing-box-arm64 2>/dev/null \
            || { echo "⚠️ arm64 v${SINGBOX_VERSION} failed, trying fallback 1.9.7..."; \
                 curl -fsSL "https://github.com/SagerNet/sing-box/releases/download/v1.9.7/sing-box-1.9.7-android-arm64-v8a.tar.gz" \
                   | tar -xz --strip-components=1 -O "sing-box-1.9.7-android-arm64-v8a/sing-box" > assets/sing-box-arm64 2>/dev/null || true; }
          
          # armeabi-v7a (ARM 32-bit)
          echo "Téléchargement sing-box arm32 v${SINGBOX_VERSION}..."
          curl -fsSL "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VERSION}/sing-box-${SINGBOX_VERSION}-android-armv7.tar.gz" \
            | tar -xz --strip-components=1 -O "sing-box-${SINGBOX_VERSION}-android-armv7/sing-box" > assets/sing-box-arm 2>/dev/null \
            || { echo "⚠️ armv7 v${SINGBOX_VERSION} failed, trying fallback 1.9.7..."; \
                 curl -fsSL "https://github.com/SagerNet/sing-box/releases/download/v1.9.7/sing-box-1.9.7-android-armv7.tar.gz" \
                   | tar -xz --strip-components=1 -O "sing-box-1.9.7-android-armv7/sing-box" > assets/sing-box-arm 2>/dev/null || true; }
          
          # Vérification taille minimale 1MB
          for f in assets/sing-box-arm64 assets/sing-box-arm; do
            if [ -f "$f" ] && [ "$(wc -c < "$f")" -gt 1000000 ]; then
              echo "✅ $f ok ($(du -h "$f" | cut -f1))"
            else
              echo "⚠️  $f manquant ou corrompu — protocoles avancés désactivés"
              rm -f "$f"
            fi
          done

      # ── Kotlin metadata fix ───────────────────────────────────────────────────
      - name: Patch expo-module-gradle-plugin (Kotlin metadata compat)
        run: |
          PLUGIN="node_modules/expo-modules-core/expo-module-gradle-plugin/build.gradle.kts"
          if [ -f "$PLUGIN" ] && ! grep -q "Xskip-metadata-version-check" "$PLUGIN"; then
            printf '\ntasks.withType<org.jetbrains.kotlin.gradle.tasks.KotlinCompile>().configureEach {\n    kotlinOptions { freeCompilerArgs = freeCompilerArgs + listOf("-Xskip-metadata-version-check") }\n}\n' >> "$PLUGIN"
            echo "[patch] Kotlin metadata fix appliqué"
          else
            echo "[patch] Déjà appliqué ou fichier absent"
          fi

      # ── Expo prebuild ─────────────────────────────────────────────────────────
      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_PUBLIC_API_URL: https://vpnsxb.afrihall.com/api

      # ── Gradle properties ─────────────────────────────────────────────────────
      - name: Configure Gradle (performance)
        run: |
          cat >> android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+UseParallelGC
          org.gradle.daemon=false
          org.gradle.parallel=true
          org.gradle.caching=true
          android.enableJetifier=true
          android.enableR8.fullMode=false
          EOF

      # ── Build APK ─────────────────────────────────────────────────────────────
      - name: Build APK (release)
        working-directory: app-mobile/android
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew :app:assembleRelease \
            --no-daemon \
            --build-cache \
            -x :react-native-reanimated:assertWorkletsVersionTask \
            -x :react-native-reanimated:assertMinimalReactNativeVersionTask \
            -x :react-native-worklets:assertMinimalReactNativeVersionTask \
            2>&1 | tee build.log
          echo "::group::Gradle output (dernières 60 lignes)"
          tail -60 build.log
          echo "::endgroup::"
        env:
          NODE_ENV: production
          EXPO_PUBLIC_API_URL: https://vpnsxb.afrihall.com/api

      # ── Collect APK ───────────────────────────────────────────────────────────
      - name: Localiser et copier l'APK
        working-directory: app-mobile
        run: |
          mkdir -p build
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -n 1)
          if [ -z "$APK" ]; then
            echo "::error::Aucun APK trouvé"
            find android/app/build/outputs -type f 2>/dev/null || true
            exit 1
          fi
          cp "$APK" build/sxb-vpn.apk
          echo "✅ APK: $(ls -lh build/sxb-vpn.apk)"
          echo "APK_PATH=app-mobile/build/sxb-vpn.apk" >> "$GITHUB_ENV"

      # ── Upload artifact ───────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sxb-vpn-android-apk-${{ github.run_number }}
          path: app-mobile/build/sxb-vpn.apk
          if-no-files-found: error
          retention-days: 30

      # ── GitHub Release ────────────────────────────────────────────────────────
      - name: GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "SXB VPN APK #${{ github.run_number }}"
          body: |
            ## SXB VPN — APK Android #${{ github.run_number }}

            Build depuis commit `${{ github.sha }}`

            ### Protocoles supportés
            - ✅ **SSH / SSH+Payload** — tunnel JSch natif Java
            - ✅ **VLESS / VMess / Trojan** — sing-box v1.11.7
            - ✅ **Shadowsocks** — sing-box
            - ✅ **WireGuard** — sing-box
            - ✅ **Hysteria2 / TUIC** — sing-box
            - ✅ Permission VPN Android avec popup système réelle
            - ✅ Foreground Service — fonctionne en arrière-plan
            - ✅ Config chiffrée localement (XOR + base64)
            - ✅ Mode hors ligne (config locale)
            - ✅ Interface FR/EN

            ### Installation
            1. Télécharger `sxb-vpn.apk`
            2. Android → Paramètres → Sécurité → Sources inconnues
            3. Installer et activer avec votre token `SXB-USER-XXXX-XXXX-XXXX`

            ### Backend
            `https://vpnsxb.afrihall.com/api`
          files: app-mobile/build/sxb-vpn.apk
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Deploy APK sur VPS ────────────────────────────────────────────────────
      - name: Déployer APK sur VPS
        if: github.ref == 'refs/heads/main'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 141.95.112.93
          username: ubuntu
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          source: "app-mobile/build/sxb-vpn.apk"
          target: "/tmp/"
          strip_components: 2
        continue-on-error: true

      - name: Installer APK dans dossier distribution VPS
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 141.95.112.93
          username: ubuntu
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          script: |
            sudo mkdir -p /var/www/apk
            sudo cp /tmp/sxb-vpn.apk /var/www/apk/sxbvpn-latest.apk 2>/dev/null || true
            sudo cp /tmp/sxb-vpn.apk "/var/www/apk/sxbvpn-build-${{ github.run_number }}.apk" 2>/dev/null || true
            echo "Déployé: $(ls -lh /var/www/apk/ 2>/dev/null)"
        continue-on-error: true
