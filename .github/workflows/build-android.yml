name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "app-mobile/**"
      - ".github/workflows/build-android.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-expo54-${{ hashFiles('app-mobile/package.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-expo54-
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # ── Kotlin metadata version fix ──────────────────────────────────────────
      # expo-module-gradle-plugin: suppress Kotlin metadata version mismatch between
      # Gradle bundled Kotlin 1.9.x and dependencies compiled with Kotlin 2.1.x.
      - name: Patch expo-module-gradle-plugin for Kotlin metadata compatibility
        run: |
          PLUGIN="node_modules/expo-modules-core/expo-module-gradle-plugin/build.gradle.kts"
          if [ -f "$PLUGIN" ] && ! grep -q "Xskip-metadata-version-check" "$PLUGIN"; then
            printf '\n// CI patch: suppress Kotlin metadata version mismatch\ntasks.withType<org.jetbrains.kotlin.gradle.tasks.KotlinCompile>().configureEach {\n    kotlinOptions {\n        freeCompilerArgs = freeCompilerArgs + listOf("-Xskip-metadata-version-check")\n    }\n}\n' >> "$PLUGIN"
            echo "[patch] Added -Xskip-metadata-version-check to $PLUGIN"
          else
            echo "[patch] Already patched or file not found"
          fi

      - name: Generate native Android project (Expo prebuild)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_PUBLIC_API_URL: https://vpnsxb.afrihall.com/api

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: List assets
        run: ls -lah android/app/src/main/assets/ || true

      - name: Tune Gradle properties
        run: |
          echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m" >> android/gradle.properties
          echo "org.gradle.daemon=false" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties

      - name: Build APK
        working-directory: app-mobile/android
        run: |
          ./gradlew :app:assembleRelease \
            --no-daemon \
            --stacktrace \
            -x :react-native-reanimated:assertWorkletsVersionTask \
            -x :react-native-reanimated:assertMinimalReactNativeVersionTask \
            -x :react-native-worklets:assertMinimalReactNativeVersionTask
        env:
          NODE_ENV: production
          EXPO_PUBLIC_API_URL: https://vpnsxb.afrihall.com/api

      - name: Locate and copy APK
        working-directory: app-mobile
        run: |
          mkdir -p build
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -n 1)
          if [ -z "$APK" ]; then
            echo "::error::Aucun APK trouvé"
            find android/app/build/outputs -type f 2>/dev/null || true
            exit 1
          fi
          cp "$APK" build/sxb-vpn.apk
          echo "APK final: $(ls -lh build/sxb-vpn.apk)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sxb-vpn-android-apk
          path: app-mobile/build/sxb-vpn.apk
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "SXB VPN APK #${{ github.run_number }} — Tunnel SSH"
          body: |
            ## SXB VPN — APK Android (tunnel SSH)

            Build automatique depuis le commit `${{ github.sha }}`

            ### Cette version
            - ✅ **Protocole** : SSH uniquement (tunnel sécurisé)
            - ✅ **Moteur SSH** : JSch (Java SSH client, pur Java — aucun binaire natif)
            - ✅ **Module natif Android** : SxbVpnService + VpnService Android
            - ✅ **Token forfait** : format `SXB-DATA-XXXX-XXXX-XXXX`
            - ✅ **Connexion** : `bugsleuth@node05.mikosi.fr.eu.org:443` (SNI yamo.mtn.cm)

            ### Comment installer
            1. Télécharger `sxb-vpn.apk` ci-dessous
            2. Android : Paramètres → Sécurité → autoriser les sources inconnues
            3. Installer l APK
            4. Activer avec votre token SXB-USER-XXXX

            ### Flux complet
            `Token → Activation → Config backend → Stockage local → POWER → Tunnel réel`
          files: app-mobile/build/sxb-vpn.apk
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Déployer l'APK sur le VPS pour distribution ───────────────────────
      - name: Deploy APK to VPS
        if: github.ref == 'refs/heads/main'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 141.95.112.93
          username: ubuntu
          password: ${{ secrets.VPS_PASSWORD }}
          source: "app-mobile/build/sxb-vpn.apk"
          target: "/tmp/"
          strip_components: 2
        continue-on-error: true

      - name: Rename APK on VPS
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 141.95.112.93
          username: ubuntu
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cp /tmp/sxb-vpn.apk /var/www/apk/sxbvpn-latest.apk 2>/dev/null || true
            echo "APK deployed: $(ls -lh /var/www/apk/sxbvpn-latest.apk 2>/dev/null || echo 'not found')"
        continue-on-error: true
