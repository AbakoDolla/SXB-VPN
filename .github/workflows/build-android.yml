name: Build Android APK — SXB VPN

on:
  push:
    branches: [main]
    paths:
      - "app-mobile/**"
      - ".github/workflows/build-android.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-mobile

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js 22 ────────────────────────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # ── JDK 17 ────────────────────────────────────────────────────────────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── Cache ~/.gradle ────────────────────────────────────────────────────────
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-caches-${{ runner.os }}-${{ hashFiles('app-mobile/package.json') }}
          restore-keys: |
            gradle-caches-${{ runner.os }}-

      # ── Cache node_modules ────────────────────────────────────────────────────
      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v4
        with:
          path: app-mobile/node_modules
          key: node-modules-${{ runner.os }}-node22-${{ hashFiles('app-mobile/package.json') }}

      # ── Install dependencies — MUST run before any node_modules/ patch ────────
      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm install --legacy-peer-deps

      # FIX #1 : patch Kotlin metadata compat — après npm install (node_modules/ doit exister)
      - name: Patch expo-module-gradle-plugin (Kotlin metadata compat)
        run: |
          PLUGIN="node_modules/expo-modules-core/expo-module-gradle-plugin/build.gradle.kts"
          if [ -f "$PLUGIN" ] && ! grep -q "Xskip-metadata-version-check" "$PLUGIN"; then
            printf '\ntasks.withType<org.jetbrains.kotlin.gradle.tasks.KotlinCompile>().configureEach {\n    kotlinOptions { freeCompilerArgs = freeCompilerArgs + listOf("-Xskip-metadata-version-check") }\n}\n' >> "$PLUGIN"
            echo "[patch] Kotlin metadata fix appliqué"
          else
            echo "[patch] Déjà appliqué ou expo-modules-core absent (normal si cache node)"
          fi

      # ── Cache Gradle build artifacts uniquement (pas android/app/build.gradle) ──
      # IMPORTANT : on ne cache PAS le dossier android/ complet car build.gradle
      # est modifié par les steps suivants (signing, packaging). Mettre ce fichier
      # dans le cache provoquerait des corruptions aux runs suivants (double injection).
      # On cache seulement les artefacts Gradle compilés pour accélérer le build.
      - name: Cache Gradle build artifacts
        id: cache-android
        uses: actions/cache@v4
        with:
          path: |
            app-mobile/android/.gradle
            app-mobile/android/app/build
          key: android-gradle-v5-${{ runner.os }}-${{ hashFiles('app-mobile/package.json', 'app-mobile/app.json', 'app-mobile/plugins/**', 'app-mobile/modules/android-native/**/*.kt') }}
          restore-keys: |
            android-gradle-v5-${{ runner.os }}-

      # ── Expo prebuild — TOUJOURS (régénère build.gradle propre à chaque run) ──
      # Sans --clean : préserve les artefacts Gradle dans android/app/build/
      # Sans la condition cache-hit : garantit un build.gradle vierge avant les
      # étapes de modification (signing, packaging, ABI) → pas de double-injection.
      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_NO_TELEMETRY: "1"
          EXPO_PUBLIC_API_URL: https://vpnsxb.afrihall.com/api

      # FIX #2 : JitPack — injecter seulement dans la section dependencyResolutionManagement
      # (première occurrence de mavenCentral uniquement pour éviter les doublons)
      - name: Injecter JitPack dans settings.gradle
        run: |
          SETTINGS="android/settings.gradle"
          if [ -f "$SETTINGS" ] && ! grep -q "jitpack.io" "$SETTINGS"; then
            # Remplacer SEULEMENT la première occurrence de mavenCentral()
            sed -i '0,/mavenCentral()/{s|mavenCentral()|mavenCentral()\n        maven { url = uri("https://jitpack.io") }|}' "$SETTINGS"
            echo "[JitPack] Injecté dans $SETTINGS (première occurrence)"
            grep -n "jitpack" "$SETTINGS" | head -3
          else
            echo "[JitPack] Déjà présent ou settings.gradle absent"
          fi

      # ── ABI filter : arm64-v8a seulement ─────────────────────────────────────
      - name: Restreindre ABI à arm64-v8a
        run: |
          BUILD_GRADLE="android/app/build.gradle"
          if grep -q 'abiFilters' "$BUILD_GRADLE" 2>/dev/null; then
            sed -i 's/abiFilters.*/abiFilters "arm64-v8a"/' "$BUILD_GRADLE"
          else
            sed -i '/defaultConfig {/a\            ndk { abiFilters "arm64-v8a" }' "$BUILD_GRADLE"
          fi
          echo "[ABI] Filtres appliqués"

      # ── Copier sing-box vers Android assets natifs ────────────────────────────
      - name: Copier sing-box vers Android assets natifs
        run: |
          mkdir -p android/app/src/main/assets
          for f in sing-box-arm64 sing-box-arm; do
            if [ -f "assets/$f" ]; then
              cp "assets/$f" "android/app/src/main/assets/$f"
              echo "✅ $f ($(du -h "android/app/src/main/assets/$f" | cut -f1))"
            else
              echo "⚠️  $f absent dans assets/ — sing-box désactivé pour cette architecture"
            fi
          done

      # FIX #3 : Keystore + signing config
      # FIX CRITIQUE v2 : utiliser Node.js (déjà installé) au lieu de Python.
      # Vérifier SPÉCIFIQUEMENT "keystore/release.keystore" — pas juste "signingConfigs"
      # car Expo prebuild génère déjà signingConfigs { debug { ... } } sans release.
      # L'ancienne condition `if "signingConfigs" not in c` était donc toujours fausse,
      # le bloc release n'était jamais injecté, mais la référence signingConfigs.release
      # était quand même ajoutée → BUILD FAILED "unknown property release".
      - name: Générer le keystore de release et configurer la signature
        run: |
          mkdir -p android/app/keystore

          if [ -f "android/app/keystore/release.keystore" ]; then
            echo "✅ Keystore déjà présent (restauré depuis le cache) — génération sautée"
          else
            keytool -genkeypair -v \
              -storetype PKCS12 \
              -keystore android/app/keystore/release.keystore \
              -alias sxbvpn \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -dname "CN=SXB VPN,OU=Mobile,O=SXB,L=Paris,ST=IDF,C=FR" \
              -storepass sxbvpn_ci_2026 \
              -keypass sxbvpn_ci_2026 \
              -noprompt
            echo "✅ Keystore généré : $(ls -lh android/app/keystore/release.keystore | awk '{print $5}')"
          fi

          BUILD_GRADLE="android/app/build.gradle"
          printf '%s\n' \
            'const fs = require("fs");' \
            'const p = process.argv[2];' \
            'let c = fs.readFileSync(p, "utf8");' \
            '// Bonne condition : chercher le KEYSTORE release spécifiquement' \
            '// (Expo prebuild génère déjà signingConfigs{debug{...}} — sans release)' \
            'if (!c.includes("keystore/release.keystore")) {' \
            '  if (c.includes("signingConfigs {")) {' \
            '    c = c.replace("signingConfigs {",' \
            '      "signingConfigs {\n        release {\n            storeFile file(\"keystore/release.keystore\")\n            storePassword \"sxbvpn_ci_2026\"\n            keyAlias \"sxbvpn\"\n            keyPassword \"sxbvpn_ci_2026\"\n        }");' \
            '    console.log("[signing] bloc release injecté dans signingConfigs existant");' \
            '  } else {' \
            '    c = c.replace("android {", "android {\n    signingConfigs {\n        release {\n            storeFile file(\"keystore/release.keystore\")\n            storePassword \"sxbvpn_ci_2026\"\n            keyAlias \"sxbvpn\"\n            keyPassword \"sxbvpn_ci_2026\"\n        }\n    }");' \
            '    console.log("[signing] nouveau bloc signingConfigs.release injecté");' \
            '  }' \
            '}' \
            'if (!c.includes("signingConfig signingConfigs.release")) {' \
            '  c = c.replace(/(buildTypes[\s\S]*?release\s*\{)/, "$1\n            signingConfig signingConfigs.release");' \
            '  console.log("[signing] signingConfig reference ajoutée dans buildTypes.release");' \
            '}' \
            'fs.writeFileSync(p, c);' \
            'console.log("✅ Signature configurée dans build.gradle");' \
            > /tmp/signing_inject.js
          node /tmp/signing_inject.js "$BUILD_GRADLE"

      # FIX #4 : Gradle properties — newArchEnabled=false (cohérent avec app.json)
      # CORRECTION CRITIQUE : newArchEnabled=true forçait la nouvelle architecture alors
      # que le module natif SxbVpnModule utilise l'ancienne (ReactContextBaseJavaModule).
      # Forcer new arch ON causait des erreurs de compilation Kotlin.
      - name: Configure Gradle (performance + compatibilité RN)
        run: |
          GPROPS="android/gradle.properties"
          # Idempotent : ajouter une propriété seulement si sa clé n'est pas déjà présente
          add_prop() {
            local KEY="${1%%=*}"
            local VAL="$1"
            if ! grep -q "^${KEY}=" "$GPROPS" 2>/dev/null; then
              echo "$VAL" >> "$GPROPS"
              echo "[gradle.properties] + $KEY"
            fi
          }
          add_prop 'org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+UseParallelGC'
          add_prop 'org.gradle.daemon=false'
          add_prop 'org.gradle.parallel=true'
          add_prop 'org.gradle.caching=true'
          add_prop 'android.enableJetifier=true'
          add_prop 'android.enableR8.fullMode=false'
          add_prop 'kotlin.incremental=true'
          add_prop 'newArchEnabled=false'
          add_prop 'reactNativeArchitectures=arm64-v8a'
          echo "[Gradle] gradle.properties configuré (newArchEnabled=false — old arch)"

      # FIX #5 : Packaging META-INF — bash+sed pur (pas de Python, pas de heredoc)
      # Le plugin withJschDependency injecte packaging{} durant le prebuild.
      # Ce step complète les excludes manquants sans créer de doublon.
      - name: Corriger conflits META-INF (packaging build.gradle)
        run: |
          B="android/app/build.gradle"
          if grep -q 'packaging' "$B" 2>/dev/null; then
            echo "[packaging] Bloc packaging présent (injecté par le plugin Expo)"
            for EXCL in \
              'META-INF/versions/9/OSGI-INF/MANIFEST.MF' \
              'META-INF/*.kotlin_module' \
              'META-INF/AL2.0' \
              'META-INF/LGPL2.1'; do
              if ! grep -q "$EXCL" "$B"; then
                sed -i "s|resources {|resources {\n            excludes += \"$EXCL\"|" "$B"
                echo "[packaging] + $EXCL"
              fi
            done
          else
            echo "[packaging] Aucun bloc packaging — injection depuis zéro (GNU sed)"
            sed -i 's|android {|android {\n    packaging {\n        resources {\n            excludes += "/META-INF/{AL2.0,LGPL2.1}"\n            excludes += "META-INF/versions/9/OSGI-INF/MANIFEST.MF"\n            excludes += "META-INF/*.kotlin_module"\n            excludes += "META-INF/LICENSE.md"\n            excludes += "META-INF/LICENSE-notice.md"\n        }\n    }|' "$B"
          fi
          echo "✅ Packaging META-INF configuré"

      # ── Build APK release ─────────────────────────────────────────────────────
      - name: Build APK (release)
        working-directory: app-mobile/android
        run: |
          set -o pipefail
          chmod +x gradlew

          SKIP_TASKS=""
          for task in \
            ":react-native-reanimated:assertWorkletsVersionTask" \
            ":react-native-reanimated:assertMinimalReactNativeVersionTask" \
            ":react-native-worklets:assertMinimalReactNativeVersionTask" \
            ":app:lintVitalRelease" \
            ":app:lintVitalAnalyzeRelease"; do
            if ./gradlew tasks --all 2>/dev/null | grep -qF "${task#:}"; then
              SKIP_TASKS="$SKIP_TASKS -x $task"
            fi
          done

          ./gradlew :app:assembleRelease \
            --no-daemon \
            --build-cache \
            --parallel \
            $SKIP_TASKS \
            2>&1 | tee /tmp/gradle-build.log

          echo "::group::Gradle output (dernières 100 lignes)"
          tail -100 /tmp/gradle-build.log
          echo "::endgroup::"
        env:
          NODE_ENV: production
          EXPO_PUBLIC_API_URL: https://vpnsxb.afrihall.com/api
          ANDROID_HOME: /usr/local/lib/android/sdk
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      # ── Localiser et copier l'APK ─────────────────────────────────────────────
      - name: Localiser et copier l'APK
        run: |
          mkdir -p build
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" 2>/dev/null | grep -v unsigned | head -n 1)
          if [ -z "$APK" ]; then
            APK=$(find android/app/build/outputs/apk -name "*.apk" 2>/dev/null | head -n 1)
          fi
          if [ -z "$APK" ]; then
            echo "::error::Aucun APK trouvé — liste des sorties :"
            find android/app/build/outputs -type f 2>/dev/null || true
            echo "--- Gradle log (erreurs) ---"
            grep -E "FAILED|error:|Error|BUILD" /tmp/gradle-build.log | tail -30 || true
            exit 1
          fi
          cp "$APK" build/sxb-vpn.apk
          echo "✅ APK: $(ls -lh build/sxb-vpn.apk)"
          echo "APK_PATH=$APK" >> "$GITHUB_ENV"

      # ── Upload artifact CI ────────────────────────────────────────────────────
      - name: Upload APK (artifact CI)
        uses: actions/upload-artifact@v4
        with:
          name: sxb-vpn-android-apk-${{ github.run_number }}
          path: app-mobile/build/sxb-vpn.apk
          if-no-files-found: error
          retention-days: 30

      # ── GitHub Release ────────────────────────────────────────────────────────
      - name: GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "SXB VPN APK #${{ github.run_number }}"
          body: |
            ## SXB VPN — APK Android #${{ github.run_number }}

            Build depuis commit `${{ github.sha }}`

            ### Moteur VPN v5
            - ✅ **VLESS / VMess / Trojan** — sing-box
            - ✅ **Shadowsocks / WireGuard / Hysteria2 / TUIC** — sing-box
            - ✅ **SSH / SSH+Payload** — JSch natif Java
            - ✅ **Kill Switch** — coupe le trafic si VPN déconnecté
            - ✅ **Auto-reconnect** — backoff exponentiel (1s→30s, 10 tentatives)
            - ✅ **Trafic temps réel** — Android TrafficStats (valeurs réelles)
            - ✅ **Config chiffrée** — Android Keystore AES-256-GCM
            - ✅ **Détection Root/Frida/Xposed** — audit sécurité avant connexion
            - ✅ **Foreground Service** — fonctionne écran verrouillé / swipe
            - ✅ **Interface FR/EN**

            ### Installation
            1. Télécharger `sxb-vpn.apk`
            2. Android → Paramètres → Sécurité → Sources inconnues → Activer
            3. Installer et activer avec votre token `SXB-USER-XXXX-XXXX-XXXX`

            ### Backend
            `https://vpnsxb.afrihall.com/api`
          files: app-mobile/build/sxb-vpn.apk
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Déployer APK sur VPS ──────────────────────────────────────────────────
      - name: Déployer APK sur VPS (scp)
        if: github.ref == 'refs/heads/main'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 141.95.112.93
          username: ubuntu
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          source: "app-mobile/build/sxb-vpn.apk"
          target: "/tmp/"
          strip_components: 2
        continue-on-error: true

      - name: Installer APK dans dossier distribution VPS
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 141.95.112.93
          username: ubuntu
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          script: |
            sudo mkdir -p /var/www/apk
            if [ -f /tmp/sxb-vpn.apk ]; then
              sudo cp /tmp/sxb-vpn.apk /var/www/apk/sxbvpn-latest.apk
              sudo cp /tmp/sxb-vpn.apk "/var/www/apk/sxbvpn-build-${{ github.run_number }}.apk"
              echo "✅ Déployé: $(ls -lh /var/www/apk/sxbvpn-latest.apk)"
            else
              echo "⚠️  /tmp/sxb-vpn.apk absent — scp a peut-être échoué"
              ls /tmp/*.apk 2>/dev/null || true
            fi
        continue-on-error: true
