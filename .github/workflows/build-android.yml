name: Build Android APK — SXB VPN

on:
  push:
    branches: [main]
    paths:
      - "app-mobile/**"
      - ".github/workflows/build-android.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-mobile

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js 22 ────────────────────────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # ── JDK 17 ────────────────────────────────────────────────────────────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── Cache ~/.gradle ────────────────────────────────────────────────────────
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-caches-${{ runner.os }}-${{ hashFiles('app-mobile/package.json') }}
          restore-keys: |
            gradle-caches-${{ runner.os }}-

      # ── Cache node_modules ────────────────────────────────────────────────────
      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v4
        with:
          path: app-mobile/node_modules
          key: node-modules-${{ runner.os }}-node22-${{ hashFiles('app-mobile/package.json') }}

      # ── Install dependencies — MUST run before any node_modules/ patch ────────
      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm install --legacy-peer-deps

      # BUG FIX #1 : ce patch doit être APRÈS npm install (node_modules/ doit exister)
      # ── Kotlin metadata compat patch ──────────────────────────────────────────
      - name: Patch expo-module-gradle-plugin (Kotlin metadata compat)
        run: |
          PLUGIN="node_modules/expo-modules-core/expo-module-gradle-plugin/build.gradle.kts"
          if [ -f "$PLUGIN" ] && ! grep -q "Xskip-metadata-version-check" "$PLUGIN"; then
            printf '\ntasks.withType<org.jetbrains.kotlin.gradle.tasks.KotlinCompile>().configureEach {\n    kotlinOptions { freeCompilerArgs = freeCompilerArgs + listOf("-Xskip-metadata-version-check") }\n}\n' >> "$PLUGIN"
            echo "[patch] Kotlin metadata fix appliqué"
          else
            echo "[patch] Déjà appliqué ou expo-modules-core absent (normal si cache node)"
          fi

      # ── Cache android/ prebuild output ────────────────────────────────────────
      - name: Cache android/ prebuild output
        id: cache-android
        uses: actions/cache@v4
        with:
          path: app-mobile/android
          key: android-prebuild-v2-${{ runner.os }}-${{ hashFiles('app-mobile/package.json', 'app-mobile/app.json', 'app-mobile/plugins/**', 'app-mobile/modules/android-native/**/*.kt') }}

      # ── Expo prebuild ─────────────────────────────────────────────────────────
      - name: Expo prebuild (Android)
        if: steps.cache-android.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: "1"
          EXPO_PUBLIC_API_URL: https://vpnsxb.afrihall.com/api

      # BUG FIX #5 : JitPack dans settings.gradle (Expo SDK 50+) ─────────────────
      # Le plugin withSxbVpn.js injecte dans app/build.gradle mais SDK 54 utilise
      # dependencyResolutionManagement dans settings.gradle → JSch introuvable.
      - name: Injecter JitPack dans settings.gradle
        run: |
          SETTINGS="android/settings.gradle"
          if [ -f "$SETTINGS" ] && ! grep -q "jitpack.io" "$SETTINGS"; then
            # Injecter avant la dernière accolade de dependencyResolutionManagement
            sed -i 's|mavenCentral()|mavenCentral()\n        maven { url = uri("https://jitpack.io") }|g' "$SETTINGS"
            echo "[JitPack] Injecté dans $SETTINGS"
            grep -A2 "jitpack" "$SETTINGS" | head -5
          else
            echo "[JitPack] Déjà présent ou settings.gradle absent"
          fi

      # ── ABI filter : arm64 + armeabi-v7a seulement ────────────────────────────
      - name: Restreindre ABI à arm64-v8a + armeabi-v7a
        run: |
          BUILD_GRADLE="android/app/build.gradle"
          if grep -q 'abiFilters' "$BUILD_GRADLE" 2>/dev/null; then
            sed -i 's/abiFilters.*/abiFilters "arm64-v8a"/' "$BUILD_GRADLE"
          else
            sed -i '/defaultConfig {/a\            ndk { abiFilters "arm64-v8a" }' "$BUILD_GRADLE"
          fi
          echo "[ABI] Filtres appliqués"

      # ── Copier sing-box vers Android assets natifs ────────────────────────────
      - name: Copier sing-box vers Android assets natifs
        run: |
          mkdir -p android/app/src/main/assets
          for f in sing-box-arm64 sing-box-arm; do
            if [ -f "assets/$f" ]; then
              cp "assets/$f" "android/app/src/main/assets/$f"
              echo "✅ $f ($(du -h "android/app/src/main/assets/$f" | cut -f1))"
            else
              echo "⚠️  $f absent dans assets/ — sing-box désactivé pour cette architecture"
            fi
          done

      # BUG FIX #4 : Générer un keystore de release et configurer la signature ───
      - name: Générer le keystore de release et configurer la signature
        run: |
          mkdir -p android/app/keystore

          # Idempotent : le dossier android/ peut être restauré depuis le cache
          # (étape "Cache android/ prebuild output"), auquel cas le keystore
          # existe déjà et keytool échouerait avec "alias already exists".
          if [ -f "android/app/keystore/release.keystore" ]; then
            echo "✅ Keystore déjà présent (restauré depuis le cache) — génération sautée"
          else
            # Générer un keystore RSA-2048 auto-signé (valide 10000 jours)
            keytool -genkeypair -v \
              -storetype PKCS12 \
              -keystore android/app/keystore/release.keystore \
              -alias sxbvpn \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -dname "CN=SXB VPN,OU=Mobile,O=SXB,L=Paris,ST=IDF,C=FR" \
              -storepass sxbvpn_ci_2026 \
              -keypass sxbvpn_ci_2026 \
              -noprompt

            echo "✅ Keystore généré : $(ls -lh android/app/keystore/release.keystore | awk '{print $5}')"
          fi

          # Injecter signingConfigs DANS android {} via Python (aucun heredoc, évite erreur YAML col 0)
          BUILD_GRADLE="android/app/build.gradle"
          printf '%s\n' \
            'import re, sys' \
            'path = sys.argv[1]' \
            'c = open(path).read()' \
            'if "signingConfigs" not in c:' \
            '    b = "\n    signingConfigs {\n        release {\n            storeFile file(\"keystore/release.keystore\")\n            storePassword \"sxbvpn_ci_2026\"\n            keyAlias \"sxbvpn\"\n            keyPassword \"sxbvpn_ci_2026\"\n        }\n    }"' \
            '    c = re.sub(r"android \{", "android {" + b, c, count=1)' \
            '    print("[signing] signingConfigs injecte dans android {}")' \
            'if "signingConfig signingConfigs.release" not in c:' \
            '    c = re.sub(r"(buildTypes\s*\{[^}]*release\s*\{)", lambda m: m.group(0) + "\n            signingConfig signingConfigs.release", c, count=1)' \
            '    print("[signing] signingConfig ref ajoutee")' \
            'open(path, "w").write(c)' \
            > /tmp/signing_inject.py
          python3 /tmp/signing_inject.py "$BUILD_GRADLE"
          echo "✅ Signature configurée dans build.gradle"

      # BUG FIX #2 & #3 : gradle.properties sans espaces parasites, sans configuration-cache
      - name: Configure Gradle (performance + compatibilité RN)
        run: |
          # BUG FIX #2 : utiliser printf au lieu de heredoc YAML
          # pour éviter les espaces d'indentation qui corrompent les propriétés.
          # BUG FIX #3 : configuration-cache=true est INCOMPATIBLE avec React Native.
          printf '%s\n' \
            'org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+UseParallelGC' \
            'org.gradle.daemon=false' \
            'org.gradle.parallel=true' \
            'org.gradle.caching=true' \
            'android.enableJetifier=true' \
            'android.enableR8.fullMode=false' \
            'kotlin.incremental=true' \
            'newArchEnabled=true' \
            'reactNativeArchitectures=arm64-v8a' \
            >> android/gradle.properties
          echo "[Gradle] Propriétés ajoutées (sans espaces parasites)"

      # ── Corriger conflits META-INF via init script Gradle (AGP 7+8 compat) ───
      - name: Corriger conflits META-INF (init script Gradle)
        run: |
          mkdir -p ~/.gradle/init.d
          printf '%s\n' \
            'allprojects {' \
            '    pluginManager.withPlugin("com.android.application") {' \
            '        android.packagingOptions.exclude("META-INF/versions/9/OSGI-INF/MANIFEST.MF")' \
            '        android.packagingOptions.exclude("META-INF/*.kotlin_module")' \
            '    }' \
            '}' \
            > ~/.gradle/init.d/packaging-fix.gradle
          echo "[packaging] Init script Gradle créé dans ~/.gradle/init.d/"

      # ── Build APK release ─────────────────────────────────────────────────────
      # BUG FIX #6 : les tâches -x assertWorkletsVersionTask / assertMinimalReactNativeVersionTask
      # peuvent ne pas exister selon la version exacte de reanimated → --continue est plus robuste.
      - name: Build APK (release)
        working-directory: app-mobile/android
        run: |
          set -o pipefail
          chmod +x gradlew

          # Désactiver les tâches d'assertion de version qui peuvent échouer si absentes
          SKIP_TASKS=""
          for task in \
            ":react-native-reanimated:assertWorkletsVersionTask" \
            ":react-native-reanimated:assertMinimalReactNativeVersionTask" \
            ":react-native-worklets:assertMinimalReactNativeVersionTask" \
            ":app:lintVitalRelease" \
            ":app:lintVitalAnalyzeRelease"; do
            # Ajouter -x seulement si la tâche existe dans le projet
            if ./gradlew tasks --all 2>/dev/null | grep -qF "${task#:}"; then
              SKIP_TASKS="$SKIP_TASKS -x $task"
            fi
          done

          ./gradlew :app:assembleRelease \
            --no-daemon \
            --build-cache \
            --parallel \
            $SKIP_TASKS \
            2>&1 | tee /tmp/gradle-build.log

          # Afficher les dernières lignes en cas d'erreur
          echo "::group::Gradle output (dernières 100 lignes)"
          tail -100 /tmp/gradle-build.log
          echo "::endgroup::"
        env:
          NODE_ENV: production
          EXPO_PUBLIC_API_URL: https://vpnsxb.afrihall.com/api
          ANDROID_HOME: /usr/local/lib/android/sdk
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      # ── Localiser et copier l'APK ─────────────────────────────────────────────
      - name: Localiser et copier l'APK
        run: |
          mkdir -p build
          # Chercher d'abord release signé, puis unsigned, puis debug
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" 2>/dev/null | grep -v unsigned | head -n 1)
          if [ -z "$APK" ]; then
            APK=$(find android/app/build/outputs/apk -name "*.apk" 2>/dev/null | head -n 1)
          fi
          if [ -z "$APK" ]; then
            echo "::error::Aucun APK trouvé — liste des sorties :"
            find android/app/build/outputs -type f 2>/dev/null || true
            echo "--- Gradle log (erreurs) ---"
            grep -E "FAILED|error:|Error|BUILD" /tmp/gradle-build.log | tail -30 || true
            exit 1
          fi
          cp "$APK" build/sxb-vpn.apk
          echo "✅ APK: $(ls -lh build/sxb-vpn.apk)"
          echo "APK_PATH=$APK" >> "$GITHUB_ENV"

      # ── Upload artifact CI ────────────────────────────────────────────────────
      - name: Upload APK (artifact CI)
        uses: actions/upload-artifact@v4
        with:
          name: sxb-vpn-android-apk-${{ github.run_number }}
          path: app-mobile/build/sxb-vpn.apk
          if-no-files-found: error
          retention-days: 30

      # ── GitHub Release ────────────────────────────────────────────────────────
      - name: GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "SXB VPN APK #${{ github.run_number }}"
          body: |
            ## SXB VPN — APK Android #${{ github.run_number }}

            Build depuis commit `${{ github.sha }}`

            ### Moteur VPN v5
            - ✅ **VLESS / VMess / Trojan** — sing-box
            - ✅ **Shadowsocks / WireGuard / Hysteria2 / TUIC** — sing-box
            - ✅ **SSH / SSH+Payload** — JSch natif Java
            - ✅ **Kill Switch** — coupe le trafic si VPN déconnecté
            - ✅ **Auto-reconnect** — backoff exponentiel (1s→30s, 10 tentatives)
            - ✅ **Trafic temps réel** — Android TrafficStats (valeurs réelles)
            - ✅ **Config chiffrée** — Android Keystore AES-256-GCM
            - ✅ **Détection Root/Frida/Xposed** — audit sécurité avant connexion
            - ✅ **Foreground Service** — fonctionne écran verrouillé / swipe
            - ✅ **Interface FR/EN**

            ### Installation
            1. Télécharger `sxb-vpn.apk`
            2. Android → Paramètres → Sécurité → Sources inconnues → Activer
            3. Installer et activer avec votre token `SXB-USER-XXXX-XXXX-XXXX`

            ### Backend
            `https://vpnsxb.afrihall.com/api`
          files: app-mobile/build/sxb-vpn.apk
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Déployer APK sur VPS ──────────────────────────────────────────────────
      - name: Déployer APK sur VPS (scp)
        if: github.ref == 'refs/heads/main'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 141.95.112.93
          username: ubuntu
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          source: "app-mobile/build/sxb-vpn.apk"
          target: "/tmp/"
          strip_components: 2
        continue-on-error: true

      - name: Installer APK dans dossier distribution VPS
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 141.95.112.93
          username: ubuntu
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          script: |
            sudo mkdir -p /var/www/apk
            # Chercher l'APK déposé par scp (strip_components=2 → /tmp/sxb-vpn.apk)
            if [ -f /tmp/sxb-vpn.apk ]; then
              sudo cp /tmp/sxb-vpn.apk /var/www/apk/sxbvpn-latest.apk
              sudo cp /tmp/sxb-vpn.apk "/var/www/apk/sxbvpn-build-${{ github.run_number }}.apk"
              echo "✅ Déployé: $(ls -lh /var/www/apk/sxbvpn-latest.apk)"
            else
              echo "⚠️  /tmp/sxb-vpn.apk absent — scp a peut-être échoué"
              ls /tmp/*.apk 2>/dev/null || true
            fi
        continue-on-error: true
