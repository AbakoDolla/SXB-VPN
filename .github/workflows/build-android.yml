name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "app-mobile/**"
      - ".github/workflows/build-android.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-mobile

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js setup ─────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app-mobile/package-lock.json

      # ── JDK ────────────────────────────────────────────────────────────────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── Gradle cache ──────────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-expo54-${{ hashFiles('app-mobile/android/gradle/wrapper/gradle-wrapper.properties', 'app-mobile/package.json') }}
          restore-keys: |
            gradle-expo54-
            gradle-

      # ── npm cache ─────────────────────────────────────────────────────────────
      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v4
        with:
          path: app-mobile/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('app-mobile/package-lock.json') }}
          restore-keys: node-modules-${{ runner.os }}-

      # ── Install deps (skip if cache hit) ──────────────────────────────────────
      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm install --legacy-peer-deps

      # ── Kotlin metadata version fix ───────────────────────────────────────────
      - name: Patch expo-module-gradle-plugin (Kotlin metadata compat)
        run: |
          PLUGIN="node_modules/expo-modules-core/expo-module-gradle-plugin/build.gradle.kts"
          if [ -f "$PLUGIN" ] && ! grep -q "Xskip-metadata-version-check" "$PLUGIN"; then
            printf '\n// CI patch: suppress Kotlin metadata version mismatch\ntasks.withType<org.jetbrains.kotlin.gradle.tasks.KotlinCompile>().configureEach {\n    kotlinOptions {\n        freeCompilerArgs = freeCompilerArgs + listOf("-Xskip-metadata-version-check")\n    }\n}\n' >> "$PLUGIN"
            echo "[patch] Xskip-metadata-version-check added"
          else
            echo "[patch] Already applied or file not found"
          fi

      # ── Expo prebuild ─────────────────────────────────────────────────────────
      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_PUBLIC_API_URL: https://vpnsxb.afrihall.com/api

      # ── Gradle properties ─────────────────────────────────────────────────────
      - name: Configure Gradle (JVM + parallelism)
        run: |
          cat >> android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+UseParallelGC
          org.gradle.daemon=false
          org.gradle.parallel=true
          org.gradle.caching=true
          android.enableJetifier=true
          android.enableR8.fullMode=false
          EOF

      # ── Build APK (debug + release) ───────────────────────────────────────────
      - name: Build APK (release)
        working-directory: app-mobile/android
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease \
            --no-daemon \
            --build-cache \
            -x :react-native-reanimated:assertWorkletsVersionTask \
            -x :react-native-reanimated:assertMinimalReactNativeVersionTask \
            -x :react-native-worklets:assertMinimalReactNativeVersionTask \
            2>&1 | tee build.log
          echo "::group::Gradle output (last 60 lines)"
          tail -60 build.log
          echo "::endgroup::"
        env:
          NODE_ENV: production
          EXPO_PUBLIC_API_URL: https://vpnsxb.afrihall.com/api

      # ── APK collection ────────────────────────────────────────────────────────
      - name: Locate and copy APK
        working-directory: app-mobile
        run: |
          mkdir -p build
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -n 1)
          if [ -z "$APK" ]; then
            echo "::error::Aucun APK trouvé dans android/app/build/outputs/apk/"
            find android/app/build/outputs -type f 2>/dev/null || true
            exit 1
          fi
          cp "$APK" build/sxb-vpn.apk
          echo "APK: $(ls -lh build/sxb-vpn.apk)"
          echo "APK_PATH=app-mobile/build/sxb-vpn.apk" >> "$GITHUB_ENV"

      # ── Upload artifact ───────────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sxb-vpn-android-apk-${{ github.run_number }}
          path: app-mobile/build/sxb-vpn.apk
          if-no-files-found: error
          retention-days: 30

      # ── GitHub Release ────────────────────────────────────────────────────────
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "SXB VPN APK #${{ github.run_number }}"
          body: |
            ## SXB VPN — APK Android

            Build `${{ github.run_number }}` depuis commit `${{ github.sha }}`

            ### Protocoles supportés
            - ✅ SSH / SSH+Payload (tunnel JSch pur Java)
            - ✅ VLESS / VMess / Trojan (V2Ray)
            - ✅ Shadowsocks, Hysteria2, WireGuard
            - ✅ Module natif Android (SxbVpnService + VpnService)
            - ✅ Config VPN chiffrée localement (XOR + base64)
            - ✅ Kill Switch + reconnexion automatique
            - ✅ Token SXB-DATA-XXXX-XXXX-XXXX

            ### Installation
            1. Télécharger `sxb-vpn.apk`
            2. Android → Paramètres → Sécurité → Sources inconnues
            3. Installer et activer avec votre token SXB

            ### Serveur actif
            `bugsleuth@node05.mikosi.fr.eu.org:443` (SNI yamo.mtn.cm)
          files: app-mobile/build/sxb-vpn.apk
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Deploy APK to VPS ─────────────────────────────────────────────────────
      - name: Deploy APK to VPS (SCP)
        if: github.ref == 'refs/heads/main'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 141.95.112.93
          username: ubuntu
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          source: "app-mobile/build/sxb-vpn.apk"
          target: "/tmp/"
          strip_components: 2
        continue-on-error: true

      - name: Install APK on VPS distribution folder
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 141.95.112.93
          username: ubuntu
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          script: |
            sudo mkdir -p /var/www/apk
            sudo cp /tmp/sxb-vpn.apk /var/www/apk/sxbvpn-latest.apk 2>/dev/null || true
            sudo cp /tmp/sxb-vpn.apk "/var/www/apk/sxbvpn-build-${{ github.run_number }}.apk" 2>/dev/null || true
            echo "Deployed: $(ls -lh /var/www/apk/ 2>/dev/null)"
        continue-on-error: true
