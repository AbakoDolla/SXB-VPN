name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'app-mobile/**'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: false
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app-mobile/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK (EAS)
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive \
            --output ./build/sxb-vpn.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sxb-vpn-android-apk
          path: app-mobile/build/sxb-vpn.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Create GitHub Release (on main push)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: SXB VPN APK build #${{ github.run_number }}
          body: |
            ## SXB VPN Android APK
            Build automatique depuis le commit `${{ github.sha }}`
            
            ### Installation
            1. Télécharger le fichier `.apk`
            2. Activer "Sources inconnues" sur Android
            3. Installer l'APK
            4. Activer avec ton code `SXB-USER-XXXX`
          files: app-mobile/build/sxb-vpn.apk
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
