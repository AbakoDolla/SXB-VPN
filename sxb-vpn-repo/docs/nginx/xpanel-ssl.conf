server {
    listen 8443 ssl http2;
    listen [::]:8443 ssl http2;
    server_name vpnsxb.afrihall.com _;

    ssl_certificate /etc/letsencrypt/live/vpnsxb.afrihall.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vpnsxb.afrihall.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location = / {
        return 301 /kqUtkMEvgdtx/;
    }

    # Assets servis directement depuis le disque (bons MIME types)
    location ~* ^/assets/(.+)$ {
        alias /opt/xnet/dist/assets/$1;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    location /api/v1/live/ {
        proxy_pass http://127.0.0.1:18790/api/v1/live/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:18790/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    location /kqUtkMEvgdtx {
        proxy_pass http://127.0.0.1:18790/kqUtkMEvgdtx;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}
